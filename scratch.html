<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Game Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .game-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }

        #gameModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header -->
    <header class="max-w-7xl mx-auto mb-12 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
            Scratch Game Hub
        </h1>
        <p class="text-slate-400 text-lg mb-8">Discover and play Scratch projects with enhanced performance.</p>

        <!-- Search Bar -->
        <div class="relative max-w-xl mx-auto">
            <input type="text" id="searchInput" 
                placeholder="Search games (e.g. Platformer, 3D)..." 
                class="w-full px-6 py-4 bg-slate-800 border border-slate-700 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-500 shadow-xl">
            <button onclick="handleSearch()" class="absolute right-2 top-2 bottom-2 px-6 bg-blue-600 hover:bg-blue-700 rounded-full font-semibold transition-colors">
                Search
            </button>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="max-w-7xl mx-auto">
        <div id="loadingIndicator" class="flex justify-center my-12 hidden">
            <div class="spinner"></div>
        </div>
        <div id="gameGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Dynamic items go here -->
        </div>
    </main>

    <!-- Player Overlay -->
    <div id="gameModal" onclick="closePlayer()">
        <div class="relative w-full max-w-5xl p-4" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 text-white">
                <div>
                    <h2 id="modalTitle" class="text-xl md:text-2xl font-bold">Game Title</h2>
                    <p id="modalAuthor" class="text-slate-400 text-sm">by Author</p>
                </div>
                <button onclick="closePlayer()" class="bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-lg font-bold transition-all">
                    &times; Close Game
                </button>
            </div>
            
            <!-- Player Wrapper -->
            <div class="aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-700 relative">
                <iframe id="playerFrame" src="" 
                    class="w-full h-full" 
                    allowtransparency="true" 
                    frameborder="0" 
                    allowfullscreen></iframe>
            </div>

            <div class="mt-4 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex gap-2">
                    <button onclick="togglePlayer('turbowarp')" class="px-4 py-2 bg-blue-600 rounded-md text-sm font-semibold hover:bg-blue-700 transition">TurboWarp (Recommended)</button>
                    <button onclick="togglePlayer('scratch')" class="px-4 py-2 bg-slate-700 rounded-md text-sm font-semibold hover:bg-slate-600 transition">Official Scratch</button>
                </div>
                <a id="scratchLink" href="#" target="_blank" class="text-blue-400 hover:underline text-sm font-medium">View Project on Scratch &nearrow;</a>
            </div>
        </div>
    </div>

    <script>
        const gameGrid = document.getElementById('gameGrid');
        const searchInput = document.getElementById('searchInput');
        const loadingIndicator = document.getElementById('loadingIndicator');
        let currentProject = null;

        async function fetchTrending() {
            showLoading(true);
            try {
                const response = await fetch('https://api.scratch.mit.edu');
                const data = await response.json();
                renderGames(data);
            } catch (error) {
                console.error("API Error:", error);
                gameGrid.innerHTML = `<div class="col-span-full text-center py-12"><p class="text-red-400 mb-2">Could not connect to Scratch API.</p><p class="text-slate-500 text-sm">If you opened this file directly from your disk, try uploading it to a host like GitHub Pages.</p></div>`;
            }
            showLoading(false);
        }

        async function handleSearch() {
            const query = searchInput.value.trim();
            if (!query) return;
            showLoading(true);
            try {
                const response = await fetch(`https://api.scratch.mit.edu{encodeURIComponent(query)}`);
                const data = await response.json();
                renderGames(data);
            } catch (error) { console.error("Search Error:", error); }
            showLoading(false);
        }

        function renderGames(projects) {
            gameGrid.innerHTML = '';
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'game-card bg-slate-800 rounded-xl overflow-hidden cursor-pointer border border-slate-700';
                const thumb = `https://cdn2.scratch.mit.edu{project.id}_282x210.png`;
                
                card.innerHTML = `
                    <div class="relative group">
                        <img src="${thumb}" alt="${project.title}" class="w-full aspect-video object-cover">
                        <div class="absolute inset-0 bg-blue-600/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold shadow-lg">Play Now</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-slate-100 truncate">${project.title}</h3>
                        <p class="text-slate-500 text-sm">@${project.author.username}</p>
                    </div>
                `;
                card.onclick = () => openPlayer(project);
                gameGrid.appendChild(card);
            });
        }

        function openPlayer(project) {
            currentProject = project;
            document.getElementById('modalTitle').innerText = project.title;
            document.getElementById('modalAuthor').innerText = `by ${project.author.username}`;
            document.getElementById('scratchLink').href = `https://scratch.mit.edu{project.id}/`;
            
            // Default to TurboWarp for better compatibility in various origins
            togglePlayer('turbowarp');
            
            document.getElementById('gameModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function togglePlayer(type) {
            if (!currentProject) return;
            const frame = document.getElementById('playerFrame');
            if (type === 'turbowarp') {
                frame.src = `https://turbowarp.org{currentProject.id}/embed?autoplay=true`;
            } else {
                frame.src = `https://scratch.mit.edu{currentProject.id}/embed?autostart=true`;
            }
        }

        function closePlayer() {
            document.getElementById('playerFrame').src = "";
            document.getElementById('gameModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function showLoading(active) {
            loadingIndicator.classList.toggle('hidden', !active);
            if (active) gameGrid.innerHTML = '';
        }

        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
        window.onload = fetchTrending;
    </script>
</body>
</html>
