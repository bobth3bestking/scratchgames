<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Game Portal</title>
    <style>
        :root {
            --primary: #4c97ff;
            --secondary: #ffab19;
            --bg-dark: #0f111a;
            --card-bg: #1e212b;
            --dropdown-bg: #12141d;
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --accent-glow: rgba(76, 151, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(76, 151, 255, 0.2));
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .input-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            margin-bottom: 30px;
            border: 1px solid #333;
            position: relative;
            z-index: 100;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #333;
            background: var(--dropdown-bg);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* --- Custom Animated Dropdown --- */
        .custom-select-wrapper {
            position: relative;
            width: 100%;
            user-select: none;
        }

        .custom-select-header {
            background: var(--dropdown-bg);
            border: 2px solid #333;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text);
        }

        .custom-select-header:hover {
            border-color: #555;
            background: #1a1d26;
        }

        .custom-select-header.open {
            border-color: var(--primary);
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .chevron {
            width: 12px;
            height: 12px;
            border-right: 2px solid var(--text-dim);
            border-bottom: 2px solid var(--text-dim);
            transform: rotate(45deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-right: 5px;
        }

        .custom-select-header.open .chevron {
            transform: rotate(-135deg);
            border-color: var(--primary);
        }

        .options-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--dropdown-bg);
            border: 2px solid var(--primary);
            border-top: none;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .custom-select-header.open + .options-list {
            max-height: 300px;
        }

        .option-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #222;
        }

        .option-item:last-child {
            border-bottom: none;
        }

        .option-item:hover {
            background: rgba(76, 151, 255, 0.15);
            color: var(--primary);
            padding-left: 25px;
        }

        .option-item.selected {
            background: rgba(76, 151, 255, 0.1);
            color: var(--primary);
            font-weight: bold;
        }

        /* --- Launch Button --- */
        .play-main-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #3b7edb);
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 10px;
        }

        .play-main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(76, 151, 255, 0.5);
            filter: brightness(1.1);
        }

        .play-main-btn:active {
            transform: translateY(0);
        }

        .settings {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            font-size: 0.95rem;
            color: var(--text-dim);
        }

        .settings input {
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* --- Viewer --- */
        .game-viewer {
            position: relative;
            width: 100%;
            padding-top: 75%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.9);
            border: 5px solid var(--card-bg);
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .game-viewer.active {
            display: block;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .placeholder {
            width: 100%;
            height: 480px;
            background: #12141d;
            border: 2px dashed #333;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            margin-top: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .status-msg {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .error { background: rgba(255, 76, 76, 0.1); color: #ff4c4c; display: block; border: 1px solid #ff4c4c; }

        footer {
            margin-top: 60px;
            color: #333;
            font-size: 0.85rem;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Scratch Game Portal</h1>
            <p class="subtitle">Ultimate performance & school filter bypass</p>
        </header>

        <section class="input-section">
            <div class="controls">
                <input type="text" id="projectInput" placeholder="Paste Scratch Link or Project ID" autocomplete="off">
                
                <div class="custom-select-wrapper" id="engineWrapper">
                    <div class="custom-select-header" id="selectHeader" onclick="toggleDropdown()">
                        <span id="selectedLabel">TurboWarp (Fastest)</span>
                        <div class="chevron"></div>
                    </div>
                    <div class="options-list" id="optionsList">
                        <div class="option-item selected" onclick="selectEngine('turbowarp', 'TurboWarp (Fastest)')">TurboWarp</div>
                        <div class="option-item" onclick="selectEngine('forkphorus', 'Forkphorus (Good for blocks)')">Forkphorus</div>
                        <div class="option-item" onclick="selectEngine('snail', 'Snail IDE')">Snail</div>
                        <div class="option-item" onclick="selectEngine('api-handshake', 'jay made')">jay made</div>
                        <div class="option-item" onclick="selectEngine('scratch-bypass', 'Scratch Bypass (.)')">Scratch Bypass (.)</div>
                        <div class="option-item" onclick="selectEngine('scratch', 'Official Scratch')">Official Scratch</div>
                    </div>
                </div>

                <button class="play-main-btn" onclick="loadGame()">Launch Game</button>
            </div>
            
            <div class="settings">
                <label><input type="checkbox" id="autoStart"> Auto-Start</label>
                <label><input type="checkbox" id="turboMode" checked> Turbo Boost</label>
            </div>

            <div id="status" class="status-msg"></div>
        </section>

        <main id="gameContainer">
            <div class="placeholder" id="placeholder">
                <p>READY FOR DEPLOYMENT</p>
            </div>
            <div class="game-viewer" id="viewer">
                <iframe id="gameIframe" allowtransparency="true" allowfullscreen allow="geolocation; microphone; camera"></iframe>
            </div>
        </main>

        <footer>
            Built for accessibility &bull; v3.4 Final
        </footer>
    </div>

    <script>
        let currentEngine = 'turbowarp';

        function toggleDropdown() {
            const header = document.getElementById('selectHeader');
            header.classList.toggle('open');
        }

        function selectEngine(engine, label) {
            currentEngine = engine;
            document.getElementById('selectedLabel').textContent = label;
            
            document.querySelectorAll('.option-item').forEach(item => {
                item.classList.remove('selected');
                if (item.textContent.includes(label.split(' ')[0])) {
                    item.classList.add('selected');
                }
            });

            document.getElementById('selectHeader').classList.remove('open');
        }

        window.onclick = function(event) {
            if (!event.target.closest('#engineWrapper')) {
                document.getElementById('selectHeader').classList.remove('open');
            }
        }

        async function loadGame() {
            const input = document.getElementById('projectInput').value.trim();
            const status = document.getElementById('status');
            const viewer = document.getElementById('viewer');
            const placeholder = document.getElementById('placeholder');
            const iframe = document.getElementById('gameIframe');
            const isAutoStart = document.getElementById('autoStart').checked;
            const turboEnabled = document.getElementById('turboMode').checked;

            const idMatch = input.match(/\d+/);
            
            if (!idMatch) {
                status.textContent = "CRITICAL ERROR: No Project ID detected.";
                status.className = "status-msg error";
                status.style.display = "block";
                return;
            }

            const projectid = idMatch[0];
            status.style.display = "none";
            
            let embedUrl = "";

            // Logic to handle different engines using your working version templates
            switch(currentEngine) {
                case 'turbowarp':
                    embedUrl = `https://turbowarp.org/${projectid}/embed?autoplay=${isAutoStart}&turbo=${turboEnabled}`;
                    break;
                case 'forkphorus':
                    embedUrl = `https://forkphorus.github.io/#${projectid}`;
                    break;
                case 'snail':
                    embedUrl = `https://snail-ide.js.org/#${projectid}`;
                    break;
                case 'scratch':
                    embedUrl = `https://scratch.mit.edu/${projectid}/embed?autostart=${isAutoStart}`;
                    break;
                case 'scratch-bypass':
                    // Specifically using the .mit.edu. bypass technique
                    embedUrl = `https://scratch.mit.edu./projects/${projectid}/embed?autostart=${isAutoStart}`;
                    break;
                case 'api-handshake':
                    try {
                        // "jay made" technique: Uses official Scratch bypass with token to work without mods
                        // Step 1: Handshake for token via bypassed API endpoint (root domain dot trick)
                        const response = await fetch(`https://api.scratch.mit.edu./projects/${projectid}`);
                        const data = await response.json();
                        const token = data.project_token;
                        
                        // Using official embed with trailing dot bypass and token
                        // This utilizes the direct data URL: https://projects.scratch.mit.edu/${projectid}?token=${token}
                        // This mimics "whatever TurboWarp uses" for raw data access but stays on official domains
                        embedUrl = `https://scratch.mit.edu./projects/${projectid}/embed?token=${token}&autostart=${isAutoStart}`;
                    } catch (e) {
                        status.textContent = "HANDSHAKE FAILED: Universal bypass failed or project restricted.";
                        status.className = "status-msg error";
                        status.style.display = "block";
                        return;
                    }
                    break;
            }

            if (embedUrl) {
                placeholder.style.display = "none";
                viewer.classList.add('active');
                iframe.src = embedUrl;
                viewer.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        document.getElementById('projectInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadGame();
        });
    </script>
</body>
</html>
